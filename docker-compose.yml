version: '3.8'

services:
  inquest_api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: inquest_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8000
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - infra-network

  inquest_web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.inquest.parikar.in}
    container_name: inquest_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3000
    ports:
      - "127.0.0.1:3002:3000"
    networks:
      - infra-network

networks:
  infra-network:
    external: true
